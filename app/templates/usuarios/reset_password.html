{% extends "base.html" %}
{% block title %}Contraseña de {{ usuario.username }} — Facturación AFIP{% endblock %}

{% block content %}
<h3 class="mb-3">Blanquear contraseña</h3>
<p class="text-muted">Usuario: <strong>{{ usuario.username }}</strong></p>

<form method="post" action="/usuarios/{{ usuario.id }}/password" class="row g-3" style="max-width: 32rem;">
  <div class="col-12">
    <label class="form-label">Nueva contraseña</label>
    <input type="password" name="password" class="form-control" required />
  </div>
  <div class="col-12">
    <label class="form-label">Repetir contraseña</label>
    <input type="password" name="password2" class="form-control" required />
  </div>
  <div class="col-12">
    <button type="submit" class="btn btn-primary">Guardar contraseña</button>
    <a href="/usuarios" class="btn btn-outline-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
