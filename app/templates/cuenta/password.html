{% extends "base.html" %}
{% block title %}Cambiar contraseña — Facturación AFIP{% endblock %}

{% block content %}
<h3 class="mb-3">Cambiar mi contraseña</h3>

<form method="post" action="/cuenta/password" class="row g-3" style="max-width: 32rem;">
  <div class="col-12">
    <label class="form-label">Contraseña actual</label>
    <input type="password" name="actual" class="form-control" required />
  </div>
  <div class="col-12">
    <label class="form-label">Nueva contraseña</label>
    <input type="password" name="nueva" class="form-control" required />
  </div>
  <div class="col-12">
    <label class="form-label">Repetir nueva contraseña</label>
    <input type="password" name="repetir" class="form-control" required />
  </div>
  <div class="col-12">
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="/facturas" class="btn btn-outline-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
